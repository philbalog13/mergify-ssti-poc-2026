pull_request_rules:
  # === ssti-1-math ===
  - name: ssti-1-math
    conditions:
      - base=main
      - head~=^test-ssti-1-math-
    actions:
      merge:
        method: merge
        commit_message_template: |
          SSTI1: {{ 7*7 }}
  # === ssti-2-attformat ===
  - name: ssti-2-attformat
    conditions:
      - base=main
      - head~=^test-ssti-2-attformat-
    actions:
      merge:
        method: merge
        commit_message_template: |
          SSTI2: {{ ''|attr('format')('{0.__class__}') }}
  # === ssti-3-percent ===
  - name: ssti-3-percent
    conditions:
      - base=main
      - head~=^test-ssti-3-percent-
    actions:
      merge:
        method: merge
        commit_message_template: |
          SSTI3: {{ "%d%%20" % 42 }}
